name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            **/pyproject.toml
            **/setup.cfg
      - name: Install dependencies
        run: |
          pip install -e .[test]
      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
      - name: Run tests
        run: pytest
      - name: Commit regenerated reproduced_pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add development/maplibre_examples/reproduced_pages/
          git diff --cached --quiet || git commit -m "chore: regenerate reproduced_pages [skip ci]"
          git push

name: Update MapLibre Examples

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  update-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scrapping script
        run: python development/maplibre_examples/scrapping.py

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add development/maplibre_examples/pages/ development/maplibre_examples/status.json
          git diff --cached --quiet || git commit -m "chore: update MapLibre examples [skip ci]"
          git push
